exclude: 'node_modules|.git|peppol-bis-invoice-3|UBL-2.1'
default_stages: [pre-commit]
fail_fast: false


repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: "edocument.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg|peppol-bis-invoice-3|UBL-2.1"
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.1
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]
        exclude: "peppol-bis-invoice-3|UBL-2.1"

      - id: ruff
        name: "Run ruff linter"
        exclude: "peppol-bis-invoice-3|UBL-2.1"

      - id: ruff-format
        name: "Run ruff formatter"
        exclude: "peppol-bis-invoice-3|UBL-2.1"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        types_or: [javascript, vue, scss]
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                edocument/public/dist/.*|
                .*node_modules.*|
                .*boilerplate.*|
                edocument/templates/includes/.*|
                edocument/public/js/lib/.*|
                .*peppol-bis-invoice-3.*|
                .*UBL-2.1.*
            )$


  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.44.0
    hooks:
      - id: eslint
        types_or: [javascript]
        args: ['--quiet']
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                edocument/public/dist/.*|
                cypress/.*|
                .*node_modules.*|
                .*boilerplate.*|
                edocument/templates/includes/.*|
                edocument/public/js/lib/.*|
                .*peppol-bis-invoice-3.*|
                .*UBL-2.1.*
            )$

ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: false
